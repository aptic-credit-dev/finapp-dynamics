# schema: finapp-dynamics/implementation-manifest/v1
project: Finapp Dynamics
description: >
  Machine-readable implementation plan for the Finapp Dynamics enterprise SaaS platform. This manifest is the
  authoritative build plan for the repository. Stage 0 (toolchain) is implemented and tested; every business
  module is still design-only — an extensive in-session REFERENCE implementation informs the specs, but no
  business code exists in the target repo. Statuses: documented | approved_for_build | implemented | deferred |
  requires_review.
status_legend:
  documented: Specified and consolidated; not yet approved for build in the target repo.
  approved_for_build: Cleared to build next, in dependency order.
  implemented: Real, tested code exists in this repo. Never set without passing tests.
  deferred: Designed but intentionally later (post-MVP / commercial / Phase 7).
  requires_review: Needs a business/security/engineering decision before build (see OPEN_QUESTIONS.md).

conventions:
  language: TypeScript (NestJS) + PostgreSQL 16
  isolation: RLS FORCE + tenant_isolation policy + composite (tenant_id, id) keys + composite FKs
  events: single transactional outbox (m06); typed event union in contracts
  audit: single registry (m03); registered SCREAMING_SNAKE codes; append-only
  money: decimal-safe (minor units / exact decimal); no float
  api: /api/v1/*; audited endpoints with permission + audit code
  ships_with_every_module: [permissions, events, audit_codes, tests, docs_update, manifest_update]

stages:
  - stage: 0
    name: Repository & toolchain foundation
    status: implemented
    priority: P0
    mvp: true
    target_location: repo root, packages/kernel, packages/contracts, apps/api, apps/web, tools/
    description: Scaffold monorepo, TS project refs, migration runner, CI skeleton, test harness. No business logic.
    dependencies: []
    shared_services_consumed: []
    testing_required: [smoke_lane_skeleton, db_lane_skeleton]
    delivered:
      monorepo: npm workspaces — packages/{kernel,contracts}, apps/{api,web}, tools/{migrate,test-runner}
      module_placeholders: packages/<module>/README.md for all 43 business modules (no code)
      typescript: project references, strict + noUncheckedIndexedAccess + exactOptionalPropertyTypes
      kernel: DI tokens (DB, AUDIT, AUTHZ, OUTBOX), RequestContext/SystemContext, ProblemError (RFC 9457),
        Endpoint decorator (permission + auditCode), ambient-transaction Db (withTenant/withSystem)
      contracts: DomainEvent union — deliberately empty (`never`) at Stage 0
      migration_runner: ordered by module (dependency order), checksummed + immutable, idempotent,
        atomic per migration, advisory-locked
      test_harness: framework-free PURE runner (node --experimental-strip-types, runs off source with no
        build) + DB integration lane (skipped without DATABASE_URL)
      ci: .github/workflows/ci.yml — smoke lane on PR, DB lane (postgres:16) on push
    verification:
      build: clean
      lint: clean
      format: clean
      smoke_lane: 3 suites / 73 assertions passing
      db_lane: 1 spec / 26 assertions passing — RLS convention proven, sample tables removed
      api_boot: verified — GET /api/v1/health 200; unrouted paths 404 as application/problem+json
      caveat: >
        The RLS proof was executed locally against PostgreSQL 15.2 (the only server available on the
        build machine); the platform targets PostgreSQL 16 and CI runs postgres:16. RLS FORCE, the
        tenant_isolation policy, and composite FK semantics are identical across 15 and 16, but the
        first CI DB-lane run on 16 is the authoritative confirmation.
    findings:
      - The tenant_isolation policy REQUIRES NULLIF(current_setting('app.tenant_id', true), ''). A
        transaction-local GUC reverts to the empty string, not NULL, so on a pooled connection the
        policy would raise `invalid input syntax for type uuid` instead of matching zero rows. Found by
        the db-spec; the convention and the sample were corrected.
      - RLS FORCE does not constrain a SUPERUSER — only the table owner. The app and owner roles are
        therefore both non-superuser and NOBYPASSRLS. Asserted explicitly in the db-spec.
    not_included:
      - No business tables, routes, permissions, events, or audit codes (by design).
      - Kernel tokens are declared but unbound — their owning modules land in Stage 1.
      - Boot-time validation of @Endpoint against naming-map.yaml + audit-code-registry.yaml lands with
        the first module that declares a route (Stage 1); there is nothing to validate until then.
      - apps/web is a framework-free shell — the frontend stack is undecided (OPEN_QUESTIONS.md #17).

  - stage: 1
    name: SaaS foundation
    status: approved_for_build
    priority: P0
    mvp: true
    depends_on_stage: 0
    modules:
      - module: m01-tenant
        capability: Tenancy control plane + org hierarchy + provisioning
        status: implemented
        implemented_in: Stage 1A
        merged: {pr: 2, merge_commit: 251decf, base: main}
        certified:
          postgres_version: 16
          evidence: "CI run 29417746720 (push, main) and 29417651716 (pull_request, PR #2) — DB lane PASS;
            'Assert PostgreSQL 16' asserted server_version_num is 16.x; 'DB integration specs' passed; no step skipped."
          note: >
            Developed against local PostgreSQL 15.2; the CI runs above are the authoritative certification.
            The Stage 1A caveat is discharged.
        delivered:
          tables: [tenant_type_catalogue(global reference), tenants(control plane, RLS FORCE + system escape per ADR-014),
                   tenant_status_history(append-only), tenant_environments, tenant_entities, tenant_departments, tenant_branches]
          api: /api/v1/tenants — registry CRUD + 11 lifecycle actions + status history
          permissions: 19 under tenant.* (declared, NOT granted — no role model until m02)
          audit_codes: 18 under TENANT_ (all registered in audit-code-registry.yaml)
          events: tenant.lifecycle family, 17 types, payload v1 (GAP-1 closed)
          tests: PURE smoke (251 assertions) + DB spec (46 assertions)
        # Each entry is a QUOTED scalar. Unquoted, a line like `- ADR-014: tenants is ...` is a YAML map
        # key, and the continuation line under it is a parse error — which is exactly how this file was
        # broken between Stage 1A and Stage 1B. tools/conformance now parses every manifest in the smoke
        # lane, so it cannot happen silently again.
        deviations:
          - "ADR-014: tenants is RLS FORCE with an explicit system escape; org tables are tenant-scoped
             FORCE. Both are STRICTER than ADR-001/SAAS_FOUNDATION, which permit them to be global
             non-FORCE."
          - "Permissions are tenant.<entity>.<action> (e.g. tenant.registry.view) because the kernel's
             @Endpoint validator requires three segments; audit codes are TENANT_<ENTITY>_<ACTION> because
             the audit registry format requires three segments. The two-segment names in the Stage 1A
             prompt are invalid under the repository's own conventions."
          - "API prefix is /api/v1/tenants per naming-map.yaml, not /api/v1/admin/tenants."
        not_included:
          - "No authentication: the API reads actor + permissions from headers. m02-identity replaces
             this."
          - "AUTHZ/AUDIT/OUTBOX are bound to clearly-marked Stage 1A stand-ins
             (m01-tenant/src/adapters.ts). Audit is not persisted to a spine; events are not durably
             queued. No second outbox table exists."
          - "No down-migrations: the Stage 0 migration runner does not support them."
        mvp: true
        db_ownership: [tenants(global), subsidiaries(global), subscription_plans(global), tenant_subscriptions(global), usage_meters(global), department, branch]
        api_ownership: [/api/v1/tenants]
        event_ownership: [tenant.lifecycle]
        shared_services_consumed: [kernel]
        permissions_required: [tenant.*]
        testing_required: [smoke, db_spec_isolation]
      - module: m02-identity
        capability: Authentication + RBAC + permission catalogue + SoD
        status: documented
        # SPLIT APPROVED 2026-07-15 (product owner) — planning only, no code yet.
        # This row's capability spans identity + authentication + RBAC, which is one very large stage and
        # conflicts with the Stage 1B prompt's exclusion list. Resolved by splitting into three sub-stages.
        # Recorded here so the manifest and the build do not disagree; see
        # docs/build/stages/STAGE_1B_M02_IDENTITY_READINESS.md §10.
        substages:
          # 1B IMPLEMENTED 2026-07-15. Domain, migrations, services, actor resolution, the API boundary and
          # all three route families are built and tested; x-actor-id is deleted and a conformance check
          # forbids its return. See docs/build/stages/STAGE_1B_M02_IDENTITY_COMPLETION.md for the gate
          # decision and the honest list of what 1B does NOT do.
          - {substage: 1B, module: m02-identity, status: implemented,
             owns: [identities(global), user_accounts(global), tenant_memberships,
                    identity_status_history, account_status_history, membership_status_history,
                    authentication_subjects(references only),
                    identity_type_catalogue, account_type_catalogue, membership_type_catalogue],
             # The original row said /api/v1/users for the whole of identity. Collapsing identities +
             # accounts + memberships behind one prefix would be the "one generic user service" the
             # architecture forbids — they are distinct resources with distinct lifecycles, permissions and
             # scopes. /api/v1/users stays reserved for 1C. Registered in naming-map.yaml.
             api: [/api/v1/identities, /api/v1/accounts, /api/v1/tenant-memberships],
             events: [identity.lifecycle], permissions: ["identity.*"], audit: [IDENTITY_],
             ends_with: "x-actor-id deleted; actor enters RequestContext via a signed, environment-gated dev adapter"}
          # 1C IMPLEMENTED 2026-07-18 on feature/stage-1c-authentication-sessions (NOT yet merged/certified).
          # Opaque revocable server-side sessions (ADR-015) + Argon2id credentials (ADR-016); Secure HttpOnly
          # SameSite cookies with CSRF. The Stage 1B dev actor assertion (x-dev-actor) is DELETED and a
          # conformance check forbids its return. x-permissions + ContextAuthz remain, untouched, for 1D.
          - {substage: 1C, module: m02-auth, status: implemented,
             owns: [authentication_credentials(global), login_attempts(global, pre-auth), sessions(global),
                    session_status_history(global, append-only), session_refresh_tokens(global)],
             api: [/api/v1/auth], events: [identity.authentication], permissions: ["auth.*"], audit: [AUTH_],
             ends_with: "x-dev-actor deleted; real session-backed actor via SessionActorAdapter"}
          - {substage: 1D, module: m02-rbac, status: implemented,
             owns: [permissions(global reference), roles(mixed), role_permissions(mixed),
                    role_assignments(tenant), platform_role_assignments(global),
                    sod_rules(mixed), role_status_history(mixed, append-only),
                    assignment_status_history(mixed, append-only)],
             api: [/api/v1/rbac], events: [identity.authorization], permissions: ["rbac.*"], audit: [RBAC_],
             ends_with: "x-permissions DELETED; ContextAuthz DELETED and AUTHZ bound to RbacAuthz; permissions
                         resolved from persistent role assignments, fresh per request"}
        # -------------------------------------------------------------------------------------------------
        # SUBSTAGE 1B CERTIFICATION STATUS (recorded 2026-07-17).
        #
        # `status: implemented` on the 1B substage row above is the closest LEGEND value — the conformance
        # suite requires status to be one of documented|approved_for_build|implemented|deferred|
        # requires_review, and `implemented` is accurate: real, tested code exists (asserted by conformance,
        # which checks m02 ships the actor resolver when marked implemented). It does NOT by itself claim
        # merged or PostgreSQL-16-certified. The keys below carry that distinction and sit OUTSIDE any
        # `status` field so the legend check is unaffected. Field mapping to the requested status model:
        #   implementation_status: implemented_on_feature_branch   (== legend `implemented`)
        #   certification_status:  pending_postgresql_16_ci
        #   merge_status:          not_merged
        #   stage_gate:            conditional_go
        certification:
          module: m02-identity
          substage: 1B
          branch: feature/stage-1b-m02-identity
          remote_head: 586faee   # feature-branch head at PR time; merged as 9baf98c via PR #3
          # STATUS MODEL (mapped to fields; the substage `status: implemented` above stays — it is the
          # closest legend value and real tested code exists and is now on main):
          #   implementation_status:        implemented   (merged to main via PR #3)
          #   postgresql_16_certification:  passed         (DB lane green on the PR and post-merge run)
          #   smoke_certification:          pending_remediation  (Smoke lane failed at Lint)
          #   merge_status:                 merged_with_failed_required_lane
          #   stage_gate:                   no_go_pending_remediation
          implementation_status: implemented
          postgresql_16_certification: passed
          smoke_certification: pending_remediation
          merge_status: merged_with_failed_required_lane
          stage_gate: no_go_pending_remediation
          stage_1c_readiness: no_go_until_smoke_remediation_merged
          merged_pr: 3
          merge_commit: a94c0ab
          remediation:
            branch: fix/stage-1b-ci-remediation
            reason: "PR #3 merged with a RED required Smoke lane (Lint failed; Build + smoke skipped)"
            failed_run: 29575596082      # pull_request run for PR #3 head 9baf98c
            post_merge_failed_run: 29575701016   # push run on main a94c0ab, same failure
            root_cause: "apps/api excluded test/** from its build tsconfig; the integration spec was
                         type-aware-linted via a classic-`project` eslint tsconfig that resolved @finapp/*
                         types through BUILT dist. CI lints before building, so dist was absent and lint
                         produced 173 unresolved-type errors."
            fix: "include apps/api test/** in its tsconfig + reference test-runner (uniform with all
                  workspaces); delete tsconfig.eslint.json and the eslint override; declare the Nest app
                  surface the spec drives (3 latent TS2352 casts). projectService now resolves to source and
                  lint needs no prior build."
            regression_guard: "conformance asserts every workspace with a test/ dir includes it in tsconfig"
            local_reverification: {smoke_suites: 7, smoke_assertions: 926, db_specs: 5, db_assertions: 254,
                                   fresh_checkout: true, postgres_version: "15.2"}
          pull_request: merged_pr_3_then_remediation_pr_pending
          postgres16_ci: passed   # DB lane green on run 29575596082 and 29575701016
          local_verification:
            smoke_suites: 7
            smoke_assertions: 926   # +7 conformance assertions from the regression guard
            db_specs: 5
            db_assertions: 254
            postgres_version: "15.2"   # local only; PostgreSQL 16 in CI is the authoritative gate
          scope_implemented: [identity_registry, user_account_registry, tenant_membership,
                              identity_account_membership_lifecycles, actor_resolver, dev_signed_actor_adapter,
                              identity_api, account_api, tenant_membership_api, m01_actor_context_integration,
                              x_actor_id_trust_removed, conformance_protections]
          deferred_boundaries:
            - "dev identity assertion + authentication/sessions -> Stage 1C"
            - "x-permissions removed -> Stage 1D"
            - "ContextAuthz removed -> Stage 1D"
            - "persistent RBAC -> Stage 1D"
            - "audit persistence -> m03 (deferred)"
            - "outbox delivery -> m06 (deferred)"
          conditions:
            - {id: C-CI, name: PostgreSQL 16 certification, owner: repository_maintainer,
               action: "open the Stage 1B pull request; confirm the PostgreSQL 16 DB lane passes with all
                        expected M01 and M02 specs discovered and no skipped database steps",
               merge_restriction: "Stage 1B must not merge until green",
               evidence_required: "GitHub Actions run id, server_version_num assertion, passing test counts"}
            - {id: C1, name: PAT revocation, owner: repository_or_org_admin,
               action: "revoke the previously exposed GitHub Personal Access Token",
               merge_restriction: "treat as unresolved security exposure until confirmed",
               evidence_required: "confirmation from the token owner or GitHub settings"}
            - {id: C2, name: main branch protection, owner: repository_admin,
               action: "protect main and require the Smoke and PostgreSQL 16 checks before merge",
               merge_restriction: "should not merge until protection is active unless a formally approved
                                   exception is documented",
               evidence_required: "GitHub branch-protection status"}
            - {id: C3, name: repository visibility, owner: repository_owner,
               action: "confirm whether public visibility is intentional or make the repository private",
               merge_restriction: "apply the organization's approved security decision",
               evidence_required: "repository visibility status and owner decision"}
          docs: docs/build/stages/STAGE_1B_M02_IDENTITY_COMPLETION.md
        # -------------------------------------------------------------------------------------------------
        # SUBSTAGE 1C CERTIFICATION STATUS (recorded 2026-07-18).
        #   implementation_status:        implemented   (substages[1] status: implemented, above)
        #   merge_status:                 merged         (PR #5)
        #   smoke_certification:          passed
        #   postgresql_16_certification:  passed
        #   stage_gate:                   go
        #   status:                       certified_and_complete
        certification_1c:
          module: m02-auth
          substage: 1C
          implementation_status: implemented
          smoke_certification: passed
          postgresql_16_certification: passed
          merge_status: merged
          stage_gate: go
          status: certified_and_complete
          stage_1d_readiness: go   # 1C certified on main; 1D (m02-rbac) may begin from 48cba39. NOT started.
          branch_protection: active
          merged_pr: 5
          feature_head: 8d1eeac
          merge_commit: 48cba39fe59b19c03648623b1dbd92ac4a70017c   # main HEAD, squash of PR #5
          parent_baseline: e3e51a5   # certified Stage 1B
          certified_ci_run: 29646472150   # PR #5 — Smoke + DB (Assert PostgreSQL 16) both success, no skips
          post_merge_ci_run: 29653121124  # push run on main 48cba39 — success
          local_reverification: {smoke_suites: 8, smoke_assertions: 1004, db_specs: 7, db_assertions: 301,
                                  postgres_version: "15.2", clean_checkout: true, tree_identical_to_ci_head: true}
          docs: docs/build/stages/STAGE_1C_AUTH_SESSIONS_COMPLETION.md
        # -------------------------------------------------------------------------------------------------
        # SUBSTAGE 1D STATUS (recorded 2026-07-19). Honest, and deliberately NOT claiming certified or merged.
        # The substage `status: implemented` above is the closest LEGEND value and is accurate: real, tested
        # code exists (m02-rbac module, RBAC API, bootstrap; smoke + DB specs green locally). The keys below
        # carry the merge/certification distinction and sit OUTSIDE any `status` field.
        certification_1d:
          module: m02-rbac
          substage: 1D
          branch: feature/stage-1d-rbac-authorization
          certification_branch: cert/stage-1d-rbac-authorization
          parent_baseline: 004b2fd   # certified Stage 1C merge on main; NOT rebased onto anything uncertified
          feature_head: 4669cca      # reviewed head of PR #7 (CI formatting fix)
          # Post-merge certification (recorded 2026-07-22). Squash-merged: beea0d9 has single parent 004b2fd,
          # so 4669cca is represented by content (tree byte-identical across all Stage 1D paths), not ancestry.
          implementation_status: merged
          implementation_pr: 7
          implementation_head_sha: 4669cca45e27a177dd1e63790058da6cb2cb527e
          implementation_merge_sha: beea0d90dd283b1289a74af0107b3751794dd245
          smoke_certification: passed_locally          # 9 suites, 1166 assertions, 0 failures
          postgresql_certification: passed_locally      # 9 db specs, 332 assertions, 0 failures (PostgreSQL 15.2 throwaway)
          ci_certification: passed                      # PR #7 run 29898123814 on 4669cca: Smoke + DB (PostgreSQL 16) both green
          certification_status: certified_on_branch
          certified_baseline_sha: beea0d90dd283b1289a74af0107b3751794dd245   # actual main SHA tested
          certification_pr: pending                     # cert PR prepared, NOT merged
          merge_status: merged
          stage_gate: go                                # architecture accepted (ADR-017..020)
          stage_2_readiness: not_started                # Stage 2 must NOT begin until the certification PR merges
          local_reverification: {smoke_suites: 9, smoke_assertions: 1166, db_specs: 9, db_assertions: 332,
                                  postgres_version: "15.2", clean_checkout: true, tree_identical_to_ci_head: true}
          docs: docs/build/stages/STAGE_1D_RBAC_AUTHORIZATION_COMPLETION.md
          certification_docs: docs/build/stages/STAGE_1D_RBAC_AUTHORIZATION_CERTIFICATION.md
        # -------------------------------------------------------------------------------------------------
        open_gaps:
          - "GAP-1 CLOSED in 1B: identity.lifecycle is registered in event-registry.yaml, declared in the
             contracts union, and naming-map event_family_registered is true. The conformance suite now
             asserts the agreement, so the two files cannot silently diverge again."
        blocks_removal_of:
          - "packages/m01-tenant/src/adapters.ts ContextAuthz — RESOLVED in 1D. The class is DELETED and
             AUTHZ is bound to the persistent RbacAuthz (apps/api/src/platform.module.ts). The x-permissions
             header is gone from all live source; the conformance suite now asserts ZERO live use of both
             x-permissions and ContextAuthz, so neither can return quietly."
          - "packages/m02-identity/src/dev-actor-adapter.ts DevActorAdapter — the signed development actor
             source. MUST NOT outlive substage 1C. It is not authentication: it proves the caller holds the
             dev secret, never that they are the person, so assurance is 'development' and never better.
             It refuses to construct outside NODE_ENV=development|test, and apps/api refuses to BOOT in
             production rather than serve without an actor source. The x-dev-actor header is named in
             exactly ONE file and the conformance suite asserts that."
        mvp: true
        # Whole-module ownership, across all three substages. The 1B slice is the substages[0] row above;
        # roles/permissions/user_roles/sessions/login_attempts remain UNBUILT and are asserted absent by
        # the conformance suite, so 1B cannot have quietly reached into 1C or 1D.
        db_ownership: [identities(global), user_accounts(global), tenant_memberships,
                       authentication_subjects(global), roles, permissions, user_roles,
                       login_attempts(global), sessions]
        api_ownership: [/api/v1/identities, /api/v1/accounts, /api/v1/tenant-memberships,
                        /api/v1/auth, /api/v1/users, /api/v1/roles]
        event_ownership: [identity.lifecycle]
        shared_services_consumed: [kernel, m01, m03]
        permissions_required: [identity.*, rbac.*]
        testing_required: [smoke, db_spec_authz]
      - module: m03-audit
        capability: Audit spine + code registry (append-only, tamper-evident)
        status: implemented   # Stage 2.1 — implemented_on_feature_branch, rebased onto certified main; see certification_2_1
        mvp: true
        db_ownership: [audit_events(mixed, append-only, hash-chained),
                       audit_retention_policy(mixed), audit_legal_hold(tenant)]
        api_ownership: [/api/v1/audit]
        event_ownership: []
        shared_services_consumed: [kernel, m01, m02]
        permissions_required: [audit.event.view, audit.event.search, audit.event.export,
