        testing_required: [smoke, db_spec_audit_chain]
        # Deferred (documented, ADR-029/031): monthly partitioning; DB-backed audit_code_registry table (the
        # YAML registry remains authoritative); chain_anchors external anchoring; retention-enforcement worker;
        # operational-metrics endpoints. Note db_ownership above reflects what SHIPPED, not the reference list.
        certification_2_1:
          module: m03-audit
          substage: "2.1"
          branch: feature/stage-2-1-m03-audit
          certification_branch: cert/stage-2-1-m03-audit
          # Merged 2026-07-22 via PR #9 (squash) onto certified Stage 1D main. Post-merge certification recorded.
          parent_baseline: 56b7d3ea9cba42a81685fb6aefa1735fe8d314b3   # certified Stage 1D main (PR #8 merge)
          implementation_status: merged
          implementation_pr: 9
          implementation_head: f6dd8e9af8385778689533131898f3332a033d64
          implementation_merge_sha: 587a3ce6afdbcd3d4d7e3735117c4e7220568a0e
          smoke_certification: passed_locally           # 10 suites, 1256 assertions, 0 failures
          postgresql_certification: passed_locally      # 10 db specs, 356 assertions, 0 failures (PostgreSQL 15.2 throwaway)
          ci_certification: passed                       # PR #9 run 29909503769 on f6dd8e9: Smoke + DB (PostgreSQL 16) both green
          certification_status: certified               # cert PR #11 merged 2026-07-23
          certified_baseline_sha: 587a3ce6afdbcd3d4d7e3735117c4e7220568a0e   # merged main SHA tested for certification
          certification_pr: 11
          certification_merge_sha: cd29b7b5b1c0220fd801989e528d06911395b7a9   # PR #11 squash merge
          merge_status: merged
          adrs: [ADR-029, ADR-030, ADR-031]
          local_reverification: {smoke_suites: 10, smoke_assertions: 1256, db_specs: 10, db_assertions: 356,
                                  postgres_version: "15.2", clean_checkout: true, tree_identical_to_ci_head: true}
          docs: docs/build/stages/STAGE_2_1_M03_AUDIT_COMPLETION.md
          certification_docs: docs/build/stages/STAGE_2_1_M03_AUDIT_CERTIFICATION.md
      - module: m06-workflow
        capability: Status, workflow, SLA, timeline, transactional outbox, idempotency
        status: documented
        mvp: true
        db_ownership: [entity_type_registry(global), status_defs, workflow_defs, workflow_instances, sla_timers, timeline_events, outbox, idempotency_keys]
        api_ownership: [/api/v1/workflow]
        event_ownership: [workflow.lifecycle]
        shared_services_consumed: [kernel, m01, m03]
        permissions_required: [workflow.*]
        testing_required: [smoke, db_spec_outbox_idempotency]
      - module: m07-rules
        capability: Versioned explainable rules + decision tables
        status: documented
        mvp: true
        shared_services_consumed: [kernel, m01, m03, m06]
        permissions_required: [rules.*]
        testing_required: [smoke]
      - module: m08-notify
        capability: Notifications + escalation
        status: documented
