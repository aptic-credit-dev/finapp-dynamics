# schema: finapp-dynamics/naming-map/v1
# Explicit module -> (api prefix, permission namespace, event family, audit prefix) mapping.
#
# WHY THIS FILE EXISTS
#   The three existing registries name the same domain three different ways, and NO mechanical rule
#   converts between them:
#       m20-glrecon  ->  /api/v1/gl-reconciliation  |  gl_reconciliation.*  |  glrecon.lifecycle
#       m13-case     ->  /api/v1/cases              |  cases.*              |  case.lifecycle
#       m21-journal  ->  /api/v1/journals           |  journals.*           |  journal.lifecycle
#   API paths are kebab-case + plural; permission namespaces are snake_case + plural; event families are
#   singular. A derivation function is impossible; the kernel needs this lookup table instead.
#
# AUTHORITY
#   This file is DERIVED and must not drift. api-registry.yaml, permission-registry.yaml and
#   event-registry.yaml remain authoritative for their own axis; implementation-manifest.yaml is
#   authoritative for event_ownership. `tools/conformance` re-derives this map from those four files and
#   fails CI on any disagreement. Fix the source registry, never this file alone.
#
# KERNEL CONTRACT
#   @Endpoint({ permission, auditCode }) is validated at boot against the owning module's row:
#     - the route's prefix must belong to the declaring module
#     - `permission` must fall under one of that module's permission_namespaces
#     - `auditCode` must start with one of that module's audit_prefixes AND be registered in
#       audit-code-registry.yaml
#     - events published via OUTBOX must belong to that module's event_families
#   A mismatch is a boot-time failure, not a warning (fail-closed, ADR-009).
registry_version: 1
derived_from: [api-registry.yaml, permission-registry.yaml, event-registry.yaml, implementation-manifest.yaml]

conventions:
  api_prefix: kebab-case, plural, under /api/v1
  permission_namespace: snake_case, plural, format <domain>.<entity>.<action>
  event_family: dot-lowercase-snake, singular domain, <domain>.<aggregate>_lifecycle | <domain>.<event>
  audit_prefix: SCREAMING_SNAKE with trailing underscore

# gap: capability is required but the axis has no registered entry — MUST be resolved before that module ships.
# n/a: module legitimately owns nothing on that axis (e.g. m04-admin owns no tables and emits no events).
modules:
  # ---------- Stage 0 — foundation packages (own nothing on any axis, by design) ----------
  - module: kernel
    stage: 0
    mvp: true
    api_prefixes: []
    permission_namespaces: []
    event_families: []
    audit_prefixes: []
    note: >
      Owns the DI tokens (DB, AUDIT, AUTHZ, OUTBOX), RequestContext, ProblemError, @Endpoint and the
      ambient-transaction Db. Enforces this map; never appears in it as a claimant.

  - module: contracts
    stage: 0
    mvp: true
    api_prefixes: []
    permission_namespaces: []
    event_families: []
    audit_prefixes: []
    note: Declares the typed event union. Empty at Stage 0; families append at the tail, never renumbered.

  # ---------- Stage 1 — SaaS foundation (approved_for_build) ----------
  - module: m01-tenant
    stage: 1
    mvp: true
    api_prefixes: [/api/v1/tenants]
    permission_namespaces: ['tenant.*']
    event_families: [tenant.lifecycle]
    event_family_registered: true # GAP-1 closed in Stage 1A: registered in event-registry.yaml
    audit_prefixes: [TENANT_]
    # Concrete names registered in Stage 1A. Both entity segments exist because the two authorities
    # disagree with the obvious name: the kernel requires <domain>.<entity>.<action> (so `tenant.view`
    # is invalid) and the audit registry requires <PREFIX>_<ENTITY>_<ACTION> (so `TENANT_CREATED` is
    # invalid). `registry` / `REGISTRY` is the tenant record itself.
    permission_entities: [registry, environment, entity, department, branch]
    audit_entities: [REGISTRY, ENVIRONMENT, ENTITY, DEPARTMENT, BRANCH, ORG]

  - module: m02-identity
    stage: 1
    mvp: true
    api_prefixes: [/api/v1/identities, /api/v1/accounts, /api/v1/tenant-memberships, /api/v1/auth, /api/v1/users, /api/v1/roles]
    permission_namespaces: ['identity.*', 'rbac.*']
    event_families: [identity.lifecycle]
    event_family_registered: true # GAP-1 closed in Stage 1B: registered in event-registry.yaml
    audit_prefixes: [IDENTITY_, RBAC_]
    # Stage 1B registered three NEW prefixes. The original set had only /api/v1/users for all of identity,
    # and collapsing identities + accounts + memberships behind it would be exactly the "one generic user
    # service" the architecture forbids — identity, account and membership are distinct resources with
    # distinct lifecycles and permissions. /api/v1/users and /api/v1/roles remain reserved for 1C/1D.
    permission_entities: [registry, account, membership] # rbac.* entities land in Stage 1D
    audit_entities: [REGISTRY, ACCOUNT, MEMBERSHIP, SUBJECT]
    substage_owners:
      1B: [/api/v1/identities, /api/v1/accounts, /api/v1/tenant-memberships]
      1C: [/api/v1/auth, /api/v1/users]
      1D: [/api/v1/roles]
    note: /api/v1/auth is auth:mixed — pre-auth routes are the documented exception to tenant resolution.

  - module: m02-auth
    stage: 1
    mvp: true
    # /api/v1/auth is also listed under m02-identity's reserved 1C set above; the route check pools all
    # modules' prefixes, so mounting @Controller('auth') is registered either way. This row is where the
    # auth AUDIT prefix, permission namespace and event family are owned.
    api_prefixes: [/api/v1/auth]
    permission_namespaces: ['auth.*']
    event_families: [identity.authentication]
    event_family_registered: true # GAP-1 closed in Stage 1C: registered in event-registry.yaml
    audit_prefixes: [AUTH_]
    permission_entities: [session]
    audit_entities: [LOGIN, SESSION, CREDENTIAL, LOCKOUT]
    note: >
      Stage 1C. Opaque, revocable server-side sessions (ADR-015) + Argon2id credentials (ADR-016).
      Secure HttpOnly SameSite cookies with CSRF. Retires the Stage 1B dev actor assertion (x-dev-actor).

  - module: m03-audit
    stage: 1
    mvp: true
    api_prefixes: [/api/v1/audit]
    permission_namespaces: ['audit.*']
    event_families: [] # n/a — manifest:68 declares event_ownership: []
    audit_prefixes: [AUDIT_]

  - module: m06-workflow
    stage: 1
    mvp: true
    api_prefixes: [/api/v1/workflow]
    permission_namespaces: ['workflow.*']
    event_families: [workflow.lifecycle]
    event_family_registered: false # GAP-1: manifest:77, absent from event-registry.yaml
    audit_prefixes: [WORKFLOW_]
    note: Owns OUTBOX — the only event-delivery path (ADR-004). All other modules publish through it.

  - module: m07-rules
    stage: 1
    mvp: true
    api_prefixes: [] # GAP-2: no prefix registered; rules are tenant-configurable via m04-admin
    permission_namespaces: ['rules.*']
    event_families: []
    audit_prefixes: [RULES_]

  - module: m08-notify
    stage: 1
    mvp: true
    api_prefixes: [/api/v1/notifications]
    permission_namespaces: ['notifications.*']
    event_families: [notification.lifecycle]
    event_family_registered: false # GAP-1: manifest:95, absent from event-registry.yaml
    audit_prefixes: [NOTIFY_]

  - module: m09-docs
    stage: 1
    mvp: true
    api_prefixes: [/api/v1/documents]
    permission_namespaces: ['documents.*']
    event_families: [document.lifecycle]
    event_family_registered: false # GAP-1: manifest:106, absent from event-registry.yaml
    audit_prefixes: [DOC_]

  - module: m04-admin
    stage: 1
    mvp: true
    api_prefixes: [/api/v1/admin]
    permission_namespaces: ['admin.*']
    event_families: [] # n/a — console over m01/m02/m03/m06/m07/m08
    audit_prefixes: [ADMIN_]

  - module: m10-report
    stage: null # GAP-3: mvp:true but in NO manifest stage
    mvp: true
    api_prefixes: [/api/v1/reports]
    permission_namespaces: ['reports.*']
    event_families: []
    audit_prefixes: [REPORT_]

  - module: m05-hub
    stage: null # GAP-3: mvp:true, phase 1, in NO manifest stage
    mvp: true
    api_prefixes: []
    permission_namespaces: []
    event_families: []
    audit_prefixes: []
    note: >
      Registry defines m05-hub as "Entity registry / adapter seam" with reference_tables:0, but
      DATABASE_SCHEMA_CATALOGUE.md:17 attributes entity_type_registry to m06. Ownership unresolved.

  # ---------- Stage 2 — Operational ----------
  - module: m12-feedback
    stage: 2
    mvp: true
    api_prefixes: [/api/v1/feedback]
    permission_namespaces: ['feedback.*']
    event_families: [feedback.lifecycle]
    event_family_registered: true
    audit_prefixes: [FEEDBACK_]

  - module: m13-case
    stage: 2
    mvp: true
    api_prefixes: [/api/v1/cases]
    permission_namespaces: ['cases.*']
    event_families: [case.lifecycle, case.converted_to_matter]
    event_family_registered: true
    audit_prefixes: [CASE_]
    note: Consumes feedback.escalated. Emits case.converted_to_matter for m14.

  # ---------- Stage 3 — Finance ----------
  - module: m19-finance
    stage: 3
    mvp: true
    api_prefixes: [] # GAP-2: no prefix registered
    permission_namespaces: ['finance.*']
    permission_namespace_registered: false # GAP-4: manifest:160 requires finance.*, absent from permission-registry.yaml
    event_families: []
    audit_prefixes: [FIN_]
    note: No module spec exists in docs/04-modules/ — first module of Stage 3 is unspecified.

  - module: m15-recon
    stage: 3
    mvp: true
    api_prefixes: [/api/v1/reconciliation]
    permission_namespaces: ['reconciliation.*']
    event_families: [reconciliation.lifecycle]
    event_family_registered: true
    audit_prefixes: [RECON_]

  - module: m15a-matching
    stage: 3
    mvp: true
    api_prefixes: [] # n/a — engine behind m15-recon
    permission_namespaces: []
    event_families: []
    audit_prefixes: [RECON_] # shares m15's prefix

  - module: m20-glrecon
    stage: 3
    mvp: true
    api_prefixes: [/api/v1/gl-reconciliation]
    permission_namespaces: ['gl_reconciliation.*']
    event_families: [glrecon.lifecycle]
    event_family_registered: true
    audit_prefixes: [GLRECON_]
    note: The canonical three-way divergence — gl-reconciliation / gl_reconciliation / glrecon.

  - module: m21-journal
    stage: 3
    mvp: true
    api_prefixes: [/api/v1/journals]
    permission_namespaces: ['journals.*']
    event_families: [journal.lifecycle, posting_request.lifecycle]
    event_family_registered: true
    audit_prefixes: [JOURNAL_]
    note: DRAFT-ONLY in MVP. posting_request.lifecycle is registered but posting is deferred.

  - module: m22-approval
    stage: 3
    mvp: true
    api_prefixes: [/api/v1/approvals]
    permission_namespaces: ['approvals.*']
    event_families: [approval.lifecycle]
    event_family_registered: true
    audit_prefixes: [APPROVAL_]

  - module: m23-finance-integration
    stage: 3
    mvp: false
    api_prefixes: []
    permission_namespaces: []
    event_families: []
    audit_prefixes: [FIN_]

  # ---------- Stage 4 — Legal ----------
  - module: m14-legal
    stage: 4
    mvp: partial
    api_prefixes: [/api/v1/legal]
    permission_namespaces: ['legal.*']
    event_families: [legal.lifecycle]
    event_family_registered: true
    audit_prefixes: [LEGAL_]
    note: >
      API_CATALOGUE.md:13 also documents /matters, which is absent from api-registry.yaml.
      Read-only in MVP. Enforces privilege + ethical walls.

  - module: m16-litigation
    stage: 4
    mvp: false
    api_prefixes: [] # GAP-2
    permission_namespaces: [] # GAP-2
    event_families: [litigation.lifecycle]
    event_family_registered: true
    audit_prefixes: [LITIGATION_]

  - module: m17-recovery
    stage: 4
    mvp: false
    api_prefixes: [/api/v1/recovery]
    permission_namespaces: ['recovery.*']
    event_families: [recovery.lifecycle]
    event_family_registered: true
    audit_prefixes: [RECOVERY_]

  - module: m18-legaldocs
    stage: 4
    mvp: false
    api_prefixes: [] # GAP-2
    permission_namespaces: [] # GAP-2
    event_families: [legaldocs.lifecycle]
    event_family_registered: true
    audit_prefixes: [LEGALDOC_]

  # ---------- Stage 5 — AI ----------
  - module: m24-ai-foundation
    stage: 5
    mvp: partial
    api_prefixes: [/api/v1/ai]
    permission_namespaces: ['ai.*']
    event_families: [ai.request_lifecycle, ai.output_lifecycle, ai.governance_lifecycle]
    event_family_registered: true
    audit_prefixes: [AI_]

  - module: m25-operational-ai
    stage: 5
    mvp: partial
    api_prefixes: []
    permission_namespaces: ['ai.*'] # shares m24's namespace
    event_families: []
    audit_prefixes: [AI_]

  - module: m26-legal-ai
    stage: 5
    mvp: false
    api_prefixes: []
    permission_namespaces: ['ai.*']
    event_families: []
    audit_prefixes: [AI_]

  - module: m27-finance-ai
    stage: 5
    mvp: partial
    api_prefixes: []
    permission_namespaces: ['ai.*']
    event_families: []
    audit_prefixes: [AI_]
    note: Recon suggestions only. NEVER auto-posts (ADR-006, ADR-007).

  - module: m28-executive-ai
    stage: 5
    mvp: partial
    api_prefixes: [/api/v1/copilot]
    permission_namespaces: [] # GAP-4: /copilot has no permission namespace
    event_families: []
    audit_prefixes: [AI_]
    note: Read-only, cited, RLS-masked.

  - module: m29-ai-governance
    stage: 5
    mvp: false
    api_prefixes: []
    permission_namespaces: ['ai.*']
    event_families: [ai.governance_lifecycle]
    event_family_registered: true
    audit_prefixes: [AI_]

  # ---------- Stage 6 — Enterprise platform ----------
  - module: m30-platform
    stage: 6
    mvp: false
    api_prefixes: []
    permission_namespaces: [] # GAP-2
    event_families: [platform.lifecycle]
    event_family_registered: true
    audit_prefixes: [PLATFORM_]
    note: >
      ENTERPRISE_PLATFORM_PHASE_6.md:7 assigns feature flags + secrets seam here, but STAGE_1_PROMPT.md:16
      assigns feature flags to m04-admin (Stage 1). Unresolved — duplicate-service hazard. See GAP-5.

  - module: m31-studio
    stage: 6
    mvp: false
    api_prefixes: []
    permission_namespaces: []
    event_families: [studio.lifecycle]
    event_family_registered: true
    audit_prefixes: [STUDIO_]

  - module: m32-analytics
    stage: 6
    mvp: false
    api_prefixes: [/api/v1/analytics]
    permission_namespaces: ['analytics.*']
    event_families: [analytics.lifecycle]
    event_family_registered: true
    audit_prefixes: [ANALYTICS_]

  - module: m33-integration
    stage: 6
    mvp: false
    api_prefixes: [/api/v1/integration]
    permission_namespaces: ['integration.*']
    event_families: [connector.lifecycle]
    event_family_registered: true
