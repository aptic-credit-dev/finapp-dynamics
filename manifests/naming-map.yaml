    permission_namespaces: []
    event_families: []
    audit_prefixes: []
    note: Early AI seam, 14 reference tables. Superseded by m24? Unresolved.

conformance_checks:
  - every api_prefix here exists in api-registry.yaml, and vice versa
  - every permission_namespace here exists in permission-registry.yaml, and vice versa
  - every event_family here appears in implementation-manifest.yaml event_ownership
  - every audit_prefix here exists in audit-code-registry.yaml prefixes
  - no api_prefix, permission_namespace or audit_prefix is claimed by two modules
  - every module with api_prefixes has at least one permission_namespace # currently FAILS — see GAP-4

# Gaps blocking a clean derivation. Each needs an owner decision; none blocks Stage 0 itself.
gaps:
  - id: GAP-1
    severity: blocks_stage_1
    issue: >
      event-registry.yaml enumerates 44 of its declared 81 families and omits the ENTIRE foundation group.
      tenant.lifecycle, identity.lifecycle, workflow.lifecycle, notification.lifecycle and
      document.lifecycle are all declared in implementation-manifest.yaml event_ownership but appear in
      no family_group. Every Stage 1 module that emits events emits an unregistered family.
    affects: [m01-tenant, m02-identity, m06-workflow, m08-notify, m09-docs]
  - id: GAP-2
    severity: blocks_owning_stage
    issue: Modules with no registered API prefix and/or no permission namespace.
    affects: [m07-rules, m16-litigation, m18-legaldocs, m19-finance, m30-platform, m39-saas]
  - id: GAP-3
    severity: blocks_stage_1
    issue: m05-hub and m10-report are mvp:true but appear in no manifest stage; m11-ai likewise absent.
    affects: [m05-hub, m10-report, m11-ai]
  - id: GAP-4
    severity: blocks_owning_stage
    issue: >
      Route families with no permission namespace (/copilot, /connectors, /webhooks, /events) and a
      required namespace with no registry entry (finance.*). Every controlled route needs a permission,
      so these are un-shippable as specified.
    affects: [m28-executive-ai, m34-marketplace, m36-events, m19-finance]
  - id: GAP-5
    severity: blocks_stage_1
    issue: Feature-flag ownership claimed by both m04-admin (Stage 1) and m30-platform (Stage 6); absent from SHARED_SERVICE_OWNERSHIP.md.
    affects: [m04-admin, m30-platform]
  - id: GAP-6
    severity: blocks_stage_1
    issue: Subscription/entitlement tables owned by m01 (Stage 1) but the service is owned by m39-saas (Stage 6, deferred).
    affects: [m01-tenant, m39-saas]
