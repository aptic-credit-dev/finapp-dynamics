# schema: finapp-dynamics/event-registry/v1
# Domain-event family registry. One typed envelope per family, declared in the contracts event union, published
# through the single m06 transactional outbox, versioned payloads (v:1), idempotent consumers, tenant +
# correlation context. Reference baseline: 81 families. status is for the target repo.
registry_version: 1
delivery: transactional_outbox (m06)
reference_family_count: 81
rules:
  - Append new families to the union tail; never reuse or renumber.
  - Publish in-transaction with the state change (exactly-once intent).
  - No cross-tenant subscription; dead-letter + replay supported.
family_groups:
  # GAP-1 CLOSED (Stage 1A). implementation-manifest.yaml declared tenant.lifecycle as m01's family, but
  # it was absent from this registry — naming-map.yaml flagged the disagreement as
  # `event_family_registered: false`. Registered here alongside the module that owns and emits it.
  - {group: tenancy, families: [tenant.lifecycle], mvp: true, status: implemented, owner: m01-tenant,
     note: "17 event types in one family; payload v1. Types discriminate within the family — a new
            lifecycle event is a new type, never a new family, so consumer subscriptions stay stable."}
  # GAP-1 CLOSED for m02 (Stage 1B) — identity.lifecycle was declared in implementation-manifest but was
  # absent here; naming-map flagged it as event_family_registered: false. Registered alongside the module
  # that owns and emits it, per CLAUDE.md (events ship with their module).
  # GAP-1 CLOSED for m02-auth (Stage 1C) — identity.authentication registered alongside the module that
  # owns and emits it, in the same commit. 11 event types, payload v1; identifiers/transitions ONLY (never
  # a password, hash, token, raw identifier, email or name). Classification confidential.
  - {group: authentication, families: [identity.authentication], mvp: true, status: implemented, owner: m02-auth,
     note: "Stage 1C. Opaque-session + credential lifecycle. Account-plane: tenantId is PLATFORM_TENANT."}
  - {group: identity, families: [identity.lifecycle], mvp: true, status: implemented, owner: m02-identity,
     classification: confidential,
     note: "18 event types in one family; payload v1. Payloads carry identifiers and transitions ONLY —
            never email, phone or names: these events concern natural persons (Kenya DPA) and must not
            reach an unapproved AI provider (ADR-006). Identity/account events are platform-scoped and
            carry the all-zero PLATFORM_TENANT sentinel; membership events carry the real tenant."}
  - {group: operational, families: [feedback.lifecycle, case.lifecycle, case.converted_to_matter], mvp: true, status: documented}
  - {group: legal, families: [legal.lifecycle, litigation.lifecycle, recovery.lifecycle, legaldocs.lifecycle], mvp: partial, status: documented}
  - {group: finance, families: [reconciliation.lifecycle, glrecon.lifecycle, journal.lifecycle, approval.lifecycle, posting_request.lifecycle], mvp: true, status: documented, note: posting deferred}
  - {group: ai, families: [ai.request_lifecycle, ai.output_lifecycle, ai.governance_lifecycle], mvp: partial, status: documented}
  - {group: platform, families: [platform.lifecycle, studio.lifecycle, analytics.lifecycle], mvp: false, status: documented}
  - {group: integration, families: [connector.lifecycle, marketplace.lifecycle, devportal.lifecycle, webhook.lifecycle, eventstream.lifecycle, govrelease.lifecycle], mvp: false, status: documented}
  - {group: automation, families: [automation.lifecycle, extension.lifecycle], mvp: false, status: documented}
  - {group: commercial_saas, families: [subscription.lifecycle, usage.lifecycle, billing.lifecycle], mvp: false, status: deferred}
  - {group: resilience, families: [mobile.lifecycle, backup.lifecycle, dr.lifecycle], mvp: false, status: documented}
  - {group: security, families: [security.identity_lifecycle, security.privileged_lifecycle, security.dlp_lifecycle, security.crypto_lifecycle, security.grc_lifecycle, security.privacy_lifecycle, security.soc_lifecycle], mvp: false, status: documented}
  - {group: certification, families: [certification.programme_lifecycle, certification.migration_lifecycle, certification.uat_lifecycle, certification.pilot_lifecycle, certification.release_lifecycle], mvp: false, status: documented}
